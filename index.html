<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Los Simpson</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container-fluid">
        <a class="navbar-simpso navbar-brand" href="#">Los Simpson</a>
        <form id="buscador-form" class="d-flex" role="search">
          <input
            class="form-control me-2"
            type="search"
            id="input-busqueda"
            placeholder="Buscar personaje..."
            aria-label="Buscar"
          />
          <button class="btn btn-outline-warning" type="submit">Buscar</button>
        </form>
      </div>
    </nav>

    <main class="container">
      <section
        class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4"
        id="contenedor-personajes"
      ></section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
