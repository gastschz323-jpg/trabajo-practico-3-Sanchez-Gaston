<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TP3 - Los Simpson</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container-fluid">
        <a class="titulopag navbar-brand fw-bold" href="#">Los Simpson</a>
        <form id="buscador-form" class="d-flex" role="search">
          <input
            class="form-control me-2"
            type="search"
            id="input-busqueda"
            placeholder="Buscar personaje..."
            aria-label="Buscar"
          />
          <button class="buscar btn btn-outline-warning" type="submit">
            Buscar
          </button>
        </form>
      </div>
    </nav>

    <main class="container">
      <section
        class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4"
        id="contenedor-personajes"
      ></section>
    </main>

    <div class="modal fade" id="detalleModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content" id="contenido-modal"></div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
